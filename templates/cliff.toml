# git-cliff config for repos using `type: description [PROJ-N]` commit format.
# Scaffolded by project-setup Phase 1.5 with one templated section.
#
# Jira-link wrapping is done by git-cliff itself via commit_preprocessors —
# the regex below transforms `[PROJ-N]` in commit messages into markdown-link
# syntax before the body template renders. The {{JIRA_URL_BASE}} placeholder
# is filled at scaffold time:
#   - If project.json has jira.enabled=true: substituted with https://<jira.workspace>
#   - If jira.enabled=false: the entire JIRA_LINK_BLOCK between the sentinels
#     below is deleted, leaving [PROJ-N] as plain text in output.
# The sentinel comments (JIRA_LINK_BLOCK_START / JIRA_LINK_BLOCK_END) are
# also removed after substitution succeeds — they exist only to make the
# scaffold-time edits unambiguous.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.scope %} *({{ commit.scope }})*{% endif %}
{% endfor %}
{% endfor %}\

"""
footer = ""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false

commit_parsers = [
    { message = "^feat(\\([^)]+\\))?:", group = "Added" },
    { message = "^fix(\\([^)]+\\))?:", group = "Fixed" },
    { message = "^refactor(\\([^)]+\\))?:", group = "Changed" },
    { message = "^perf(\\([^)]+\\))?:", group = "Changed" },
    { message = "^docs(\\([^)]+\\))?:", group = "Documentation" },
    { message = "^test(\\([^)]+\\))?:", group = "Tests" },
    { message = "^chore(\\([^)]+\\))?:", group = "Maintenance" },
    { message = "^Merge", skip = true },
    { message = ".*\\[skip-changelog\\].*", skip = true },
]

# JIRA_LINK_BLOCK_START
commit_preprocessors = [
    { pattern = "\\[([A-Z]+-[0-9]+)\\]", replace = "[$1]({{JIRA_URL_BASE}}/browse/$1)" },
]
# JIRA_LINK_BLOCK_END

filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
